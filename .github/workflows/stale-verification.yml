name: Stale event verification

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Test report generator
        run: node --test tools/stale-verification-report.test.js

      - name: Build stale verification report
        shell: bash
        run: |
          AS_OF="$(date -u +%F)"
          THROUGH="$(date -u -d '+120 days' +%F)"
          node tools/stale-verification-report.js \
            --as-of "$AS_OF" \
            --from "$AS_OF" \
            --through "$THROUGH" \
            --output-dir reports/stale-verification

      - name: Upload verification report
        uses: actions/upload-artifact@v4
        with:
          name: stale-verification-${{ github.run_id }}
          path: reports/stale-verification
          retention-days: 30
