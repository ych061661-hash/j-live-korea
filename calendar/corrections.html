    <main class="info-page">
      <div class="section-kicker">CORRECTION REQUEST</div>
      <h1>정보 수정 요청</h1>
      <p class="info-lead">공연 일정 변경, 취소, 예매처 변경 또는 잘못된 정보를 발견했다면 공식 출처와 함께 알려주세요.</p>
      <form class="correction-form" id="correctionForm">
        <label>아티스트 또는 공연명<input name="artist" id="correctionArtist" required></label>
        <label>수정할 내용<textarea name="message" rows="6" required placeholder="현재 표시된 내용과 올바른 내용을 적어주세요."></textarea></label>
        <label>공식 출처 URL<input name="source" type="url" required placeholder="https://"></label>
        <button class="primary-submit" type="submit">이메일로 수정 요청 보내기</button>
        <p class="form-help">버튼을 누르면 기본 이메일 앱이 열립니다. 이 페이지 자체에는 입력 내용이 저장되지 않습니다.</p>
      </form>
