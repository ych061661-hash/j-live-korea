<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>제이라이브 코리아 관리자 | 공연 검수</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body class="admin-page">
  <div class="admin-shell">
    <header>
      <a class="brand" href="./index.html"><span class="brand-mark">J</span> 제이라이브 코리아 <b>ADMIN</b></a>
      <a class="ghost-button" href="./index.html">공개 달력 보기</a>
    </header>
    <section class="admin-intro">
      <div class="eyebrow">VERIFY BEFORE PUBLISH</div>
      <h1>공연 정보 검수함</h1>
      <p>공식 출처 두 곳의 공연일, 공연장, 예매 정보가 일치할 때만 확정하세요.</p>
    </section>
    <main class="admin-layout">
      <section class="admin-panel">
        <h2>후보 공연 등록</h2>
        <form id="eventForm">
          <div class="form-grid">
            <label class="full">아티스트 *<input name="artist" required></label>
            <label>공연일 *<input name="concertDate" type="date" required></label>
            <label>공연 시간<input name="time" placeholder="오후 7:00"></label>
            <label class="full">공연장 *<input name="venue" required></label>
            <label>선예매일<input name="presaleDate" type="date"></label>
            <label>일반예매일<input name="ticketDate" type="date"></label>
            <label>예매처<input name="vendor"></label>
            <label>장르<input name="genre" placeholder="J-POP / BAND"></label>
            <label class="full">예매 페이지 URL<input name="vendorUrl" type="url"></label>
            <label class="full">공식 출처 1 *<input name="source1" type="url" required></label>
            <label class="full">공식 출처 2<input name="source2" type="url"></label>
            <label class="full">YouTube 채널 핸들<input name="youtubeChannel" placeholder="@officialchannel"></label>
          </div>
          <button class="primary-submit" type="submit">검수함에 저장</button>
          <p class="form-help">저장된 일정은 검수 중 상태이며, 확정 전에는 공개 달력에 표시되지 않습니다.</p>
          <p class="form-message" id="message" aria-live="polite"></p>
        </form>
      </section>
      <section class="admin-panel">
        <div class="queue-head">
          <h2>등록된 일정</h2>
          <div class="counts" id="counts"></div>
        </div>
        <div class="cards" id="cards"></div>
      </section>
    </main>
  </div>
  <script src="./admin.js" defer></script>
</body>
</html>
